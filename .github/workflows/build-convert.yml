name: Build & Convert

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  convert-yolov10:
    name: "Convert YOLOv10n → NCNN"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --quiet torch --index-url https://download.pytorch.org/whl/cpu
          pip install --quiet ultralytics onnx onnxslim

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake build-essential protobuf-compiler libprotobuf-dev pkg-config

      - name: Build ncnn + PNNX
        run: bash scripts/0_setup.sh

      - name: Export YOLOv10n to TorchScript
        run: bash scripts/1_export_onnx.sh yolov10n

      - name: Convert to NCNN via PNNX
        run: bash scripts/2_pnnx_convert.sh yolov10n

      - name: Verify TopK in output
        run: |
          echo "=== TopK layers ==="
          grep "TopK" output/yolov10n.ncnn.param
          echo ""
          echo "=== Model stats ==="
          head -2 output/yolov10n.ncnn.param
          echo ""
          TOPK_COUNT=$(grep -c "TopK" output/yolov10n.ncnn.param)
          echo "TopK layer count: ${TOPK_COUNT}"
          if [ "${TOPK_COUNT}" -lt 2 ]; then
            echo "ERROR: Expected at least 2 TopK layers, got ${TOPK_COUNT}"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yolov10n-ncnn
          path: |
            output/yolov10n.ncnn.param
            output/yolov10n.ncnn.bin
          retention-days: 7
